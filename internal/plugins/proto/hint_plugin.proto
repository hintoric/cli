syntax = "proto3";

package hint.plugin.v1;

option go_package = "github.com/hintoric/cli/internal/plugins/proto";

service HintPlugin {
  rpc RunCommand(RunCommandRequest) returns (RunCommandResponse);
}

message RunCommandRequest {
  repeated string args = 1;
  AdditionalInfo info = 2;
}

message RunCommandResponse {
  int32 exit_code = 1;
}

message AdditionalInfo {
  IsTerminal terminal_state = 1;
  TerminalDimensions dims = 2;
  map<string, string> env = 3;
}

message IsTerminal {
  bool stdin = 1;
  bool stdout = 2;
  bool stderr = 3;
}

message TerminalDimensions {
  uint32 width = 1;
  uint32 height = 2;
}
