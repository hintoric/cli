name: Publish Plugin Manifest

# Manually triggered: signs plugins.toml with the configured signing key
# and uploads the signed pair to the registry bucket.
#
# Required repository variables:
#   AWS_ROLE_ARN, AWS_REGION, KMS_KEY_ID, REGISTRY_S3_BUCKET
on:
  workflow_dispatch:
    inputs:
      manifest_path:
        description: "Path to plugins.toml in this repo"
        required: true
        default: "plugins.toml"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - name: Build hint-build
        run: go build -o bin/hint-build ./cmd/hint-build

      # 1. Assume the OIDC hub role — has kms:Sign on the manifest signing key.
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Sign manifest
        run: |
          ./bin/hint-build sign \
            --manifest "${{ inputs.manifest_path }}" \
            --kms-key-id "${{ vars.KMS_KEY_ID }}"

      - name: Verify locally before publishing
        run: |
          ./bin/hint-build verify \
            --manifest "${{ inputs.manifest_path }}" \
            --pubkey cmd/hint/pubkey.pem

      # 2. Chain into the registry-publish spoke role — has s3:PutObject on the
      # registry bucket + cloudfront:CreateInvalidation on the distribution.
      # The hub-role creds from step 1 are used to assume this spoke role.
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.REGISTRY_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-chaining: true

      - name: Upload to registry
        run: |
          aws s3 cp "${{ inputs.manifest_path }}"     "s3://${{ vars.REGISTRY_S3_BUCKET }}/cli/plugins.toml"
          aws s3 cp "${{ inputs.manifest_path }}.sig" "s3://${{ vars.REGISTRY_S3_BUCKET }}/cli/plugins.toml.sig"

      - name: Invalidate CDN cache for manifest
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.REGISTRY_CDN_DISTRIBUTION_ID }}" \
            --paths "/cli/plugins.toml" "/cli/plugins.toml.sig"
