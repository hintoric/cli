name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# All five platforms (linux amd64/arm64, darwin amd64/arm64, windows amd64)
# build on macos-latest. Apple's Xcode CLT ships universal SDKs, so darwin/amd64
# cross-compiles with CGO=1 + -linkmode=external from arm64 — required for
# LC_UUID compatibility on macOS 26+. Linux/Windows targets compile pure-Go.
jobs:
  release:
    runs-on: macos-latest
    # GitHub environment "release" gates this job: only tags matching v*
    # can deploy to it. Secrets (HOMEBREW_TAP_TOKEN) and any future env-
    # scoped vars live there, not at repo level.
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT scoped to hintoric/homebrew-tap (Contents:write)
          # so GoReleaser can commit the updated Formula on each release.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # macOS Developer ID signing + notarization. Block in
          # .goreleaser.yaml self-disables when MACOS_SIGN_P12 is empty,
          # so unset secrets simply mean unsigned builds.
          MACOS_SIGN_P12:        ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD:   ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID:    ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY:       ${{ secrets.MACOS_NOTARY_KEY }}
