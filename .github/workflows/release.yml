name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write   # required for AWS OIDC role assumption

# All five platforms (linux amd64/arm64, darwin amd64/arm64, windows amd64)
# build on macos-latest. Apple's Xcode CLT ships universal SDKs, so darwin/amd64
# cross-compiles with CGO=1 + -linkmode=external from arm64 — required for
# LC_UUID compatibility on macOS 26+. Linux/Windows targets compile pure-Go.
jobs:
  release:
    runs-on: macos-latest
    # Tag-gated environment; signing credentials are fetched at run time
    # rather than stored in GitHub secrets.
    environment: release
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: true

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # Empty / unpopulated secret falls through to unsigned build:
      # the .goreleaser.yaml notarize block gates on MACOS_SIGN_P12.
      - name: Fetch signing credentials
        id: macos-creds
        run: |
          set -euo pipefail
          if ! secret=$(aws secretsmanager get-secret-value \
                --secret-id "${{ vars.MACOS_SIGNING_SECRET_ID }}" \
                --query SecretString --output text 2>/dev/null); then
            echo "::warning::signing secret not available; producing unsigned build"
            exit 0
          fi
          # Validate all fields populated.
          for k in p12_base64 p12_password notary_issuer_id notary_key_id notary_key; do
            if [ -z "$(echo "$secret" | jq -r ".$k // empty")" ]; then
              echo "::warning::signing secret missing field $k; producing unsigned build"
              exit 0
            fi
          done

          # Mask each value BEFORE any subsequent step can possibly echo it.
          # Multi-line values (notary_key) are masked per-line — GitHub mask
          # is exact-match per line, so a multi-line value passed wholesale
          # would not catch substrings printed by error messages.
          for k in p12_base64 p12_password notary_issuer_id notary_key_id; do
            echo "::add-mask::$(echo "$secret" | jq -r ".$k")"
          done
          echo "$secret" | jq -r .notary_key | while IFS= read -r line; do
            [ -n "$line" ] && echo "::add-mask::$line"
          done

          # Single-line vars first.
          {
            echo "MACOS_SIGN_P12=$(echo        "$secret" | jq -r .p12_base64)"
            echo "MACOS_SIGN_PASSWORD=$(echo   "$secret" | jq -r .p12_password)"
            echo "MACOS_NOTARY_ISSUER_ID=$(echo "$secret" | jq -r .notary_issuer_id)"
            echo "MACOS_NOTARY_KEY_ID=$(echo   "$secret" | jq -r .notary_key_id)"
          } >> "$GITHUB_ENV"

          # Multi-line value via heredoc syntax — single-line KEY=VALUE writes
          # break $GITHUB_ENV when the value spans newlines, and the runner
          # error includes raw value bytes in its log.
          DELIM="HINT_EOF_$(openssl rand -hex 16)"
          {
            echo "MACOS_NOTARY_KEY<<$DELIM"
            echo "$secret" | jq -r .notary_key
            echo "$DELIM"
          } >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # MACOS_* env vars are injected by the previous step.
